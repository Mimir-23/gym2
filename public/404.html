<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — ¡Fallaste el levantamiento!</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --primary: #dc2626;
      --secondary: #0f172a;
      --accent: #facc15;
      --light: #f8fafc;
      --font: 'Poppins', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, var(--secondary), #1e293b);
      font-family: var(--font);
      color: var(--light);
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Polvo de magnesio */
    .particle {
      position: absolute;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      pointer-events: none;
      animation: float 4s ease-in infinite;
    }
    @keyframes float {
      0% { transform: translateY(0) scale(1); opacity: .8; }
      100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
    }

    .container {
      z-index: 1;
      text-align: center;
    }

    /* Efecto fuzzy con CSS */
    #fuzzy {
      font-size: clamp(3rem, 15vw, 12rem);
      font-weight: 700;
      color: var(--accent);
      display: inline-block;
      animation: fuzzBase 1s infinite alternate;
    }
    #fuzzy:hover {
      animation: fuzzHover 0.2s infinite alternate;
    }
    @keyframes fuzzBase {
      0% { text-shadow: 1px 1px 0 var(--secondary), -1px -1px 0 var(--secondary); }
      100% { text-shadow: -1px 1px 0 var(--secondary), 1px -1px 0 var(--secondary); }
    }
    @keyframes fuzzHover {
      0% { text-shadow: 3px 3px 1px var(--secondary), -3px -3px 1px var(--secondary); }
      100% { text-shadow: -3px 3px 1px var(--secondary), 3px -3px 1px var(--secondary); }
    }

    h2 {
      font-size: 2rem;
      margin-top: 0.5rem;
      letter-spacing: 1px;
    }
    .reps {
      font-size: 3rem;
      margin: 0.5rem 0 1.5rem;
      color: var(--accent);
      font-weight: 700;
    }

    /* Mancuerna */
    .dumbbell {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      perspective: 600px;
      transition: transform 0.2s;
    }
    .dumbbell.clicked {
      animation: pop 0.3s ease-out forwards;
    }
    @keyframes pop {
      0% { transform: scale(1) rotateX(0) rotateY(0); }
      50% { transform: scale(1.2) rotateX(-10deg) rotateY(10deg); }
      100% { transform: scale(1) rotateX(0) rotateY(0); }
    }
    .plate {
      width: 50px; height: 50px;
      background: var(--primary);
      border-radius: 6px;
      position: relative;
    }
    .plate::before,
    .plate::after {
      content: '';
      position: absolute;
      background: var(--secondary);
      width: 12px; height: 30px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .plate::after { transform: translate(-50%, -50%) rotate(90deg); }
    .bar {
      width: 180px; height: 12px;
      background: var(--accent);
      border-radius: 6px;
    }

    /* Botones */
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: var(--accent);
      color: var(--secondary);
      font-weight: 700;
      border-radius: 999px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }
    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 12px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="fuzzy">404</div>
    <h2>¡Fallaste el levantamiento!</h2>
    <div class="reps" id="reps">0 reps</div>
    <div class="dumbbell" id="dumbbell">
      <div class="plate"></div>
      <div class="bar"></div>
      <div class="plate"></div>
    </div>
    <a href="/" class="btn">Regresar al Inicio</a>
  </div>

  <script>
    // Reps & pop
    const db = document.getElementById('dumbbell');
    const repsEl = document.getElementById('reps');
    let reps = 0;
    db.addEventListener('click', () => {
      reps++;
      repsEl.textContent = reps + ' reps';
      db.classList.add('clicked');
      setTimeout(() => db.classList.remove('clicked'), 300);
    });

    // Partículas
    function createParticle(){
      const p = document.createElement('div');
      const size = 4 + Math.random()*8;
      Object.assign(p.style, {
        position: 'absolute',
        background: 'rgba(255,255,255,0.2)',
        borderRadius: '50%',
        width: size + 'px',
        height: size + 'px',
        left: Math.random()*100 + 'vw',
        top: '100vh',
        pointerEvents: 'none',
        animation: 'float ' + (3 + Math.random()*2) + 's ease-in forwards'
      });
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5000);
    }
    setInterval(createParticle, 150);
  </script>
</body>
</html>
